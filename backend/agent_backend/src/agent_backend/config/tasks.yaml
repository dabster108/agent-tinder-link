build_personality_profile:
  description: >
    Your job is to have a real conversation with this person and build a deep,
    accurate psychological profile of who they are — not just what they say about
    themselves, but what their answers actually reveal.

    You have been given their initial questionnaire responses:
    {questionnaire_json}

    Do not treat these as final answers. Treat them as the opening of a conversation.
    Your task is to go deeper — to follow the threads that feel most alive, most
    contradictory, or most revealing. You are building a portrait, not filling a form.

    AS YOU WORK THROUGH THEIR RESPONSES, PAY CLOSE ATTENTION TO:

    - EMOTIONAL CHARGE: Which answers did they write most enthusiastically? Most briefly?
      Most vaguely? Energy is data. Avoidance is data.

    - LANGUAGE PATTERNS: Do they say "I feel" or "I think"? Do they center themselves
      or others in their stories? Are they concrete or abstract? Certain or hedging?

    - CONTRADICTIONS: Where does what they say conflict with what they describe doing?
      Someone who writes "I love spontaneity" but describes a perfect day that is
      carefully planned is telling you something important. Find these gaps.

    - WHAT THEY DIDN'T SAY: Notice the fields that got one-word answers. Notice the
      topics they glided past. What a person avoids is as revealing as what they share.

    - THE STORY BENEATH THE STORY: When they describe a past relationship, a conflict,
      a best day, or a fear — what does the WAY they tell it reveal about their
      attachment style, their values, their deepest needs?

    PRODUCE THE PROFILE:

    Using everything you have observed, construct a rich personality profile.
    Be specific and behavioral — not vague. Instead of "values honesty," write
    "describes dishonesty as the thing they find hardest to forgive; mentioned it
    twice unprompted." Instead of "introverted," write "describes best days as
    solo or one-on-one; uses the word 'recharge' when talking about alone time."

    You must return ONLY valid JSON — no markdown, no code fences, no explanation.

    JSON schema to follow exactly:
    {
      "summary": "2-3 sentence portrait of who this person actually is — not their
                  self-description but your read of them. Specific and behavioral.",

      "values": [
        "Each value stated as a concrete behavioral pattern, not an abstract noun.
         E.g. 'Shows loyalty through consistency — mentions showing up for people
         repeatedly' not just 'loyalty'"
      ],

      "communication_style": {
        "tone": "How they come across — e.g. 'warm but measured, takes time to open up'",
        "directness": "How direct vs. diplomatic — with evidence from their answers",
        "preferred_channel": "Written / verbal / physical presence — inferred from how they answered",
        "notes": "Any notable patterns — e.g. 'uses humor to deflect when vulnerable'"
      },

      "behavior_patterns": {
        "decision_making": "Intuitive vs. analytical, fast vs. deliberate — with evidence",
        "social_energy": "How they recharge and what drains them — specific",
        "stress_response": "What they do under pressure — inferred from their descriptions",
        "conflict_style": "How they handle disagreement — avoiding, assertive, accommodating, etc."
      },

      "relationship_preferences": {
        "short_term": "What they need early in a connection to feel safe",
        "long_term": "What they need for a relationship to sustain and grow",
        "boundaries": [
          "Specific limits they have expressed or implied — behavioral, not abstract"
        ],
        "love_languages": [
          "Inferred from what they describe as meaningful — not just self-reported"
        ]
      },

      "revealed_vs_stated": {
        "stated": [
          "What they explicitly said they want or value"
        ],
        "revealed": [
          "What their actual answers suggest they need — especially where it differs from stated"
        ],
        "contradictions": [
          "Specific gaps between stated and revealed — each one a concrete observation"
        ]
      },

      "green_flags": [
        "Specific strengths as a partner — behavioral evidence, not compliments"
      ],

      "red_flags": [
        "Genuine concerns or blind spots — stated honestly, not harshly.
         Include the evidence. If none observed, return empty array."
      ],

      "growth_edges": [
        "Areas where they are growing or being challenged — stated as observations,
         not advice. These are not criticisms."
      ],

      "attachment_signals": {
        "likely_style": "secure / anxious / avoidant / disorganized / unclear",
        "confidence": "high / medium / low",
        "evidence": "The specific things in their answers that point to this"
      },

      "compatibility_hints": {
        "works_well_with": [
          "Types of people or traits that would complement this person — specific"
        ],
        "may_clash_with": [
          "Types of people or traits that would create friction — specific"
        ]
      },

      "curiosity_queue": [
        "3-5 questions you would ask in the next session to deepen understanding.
         Each question should be natural, warm, and open — never clinical.
         These should target the most interesting gaps or contradictions you noticed."
      ],

      "working_hypothesis": "Your private psychiatric read of this person — 3-4 sentences.
                             Who are they really? What do they most need? What is the central
                             tension in their personality? This never leaves this agent."
    }

    If any field is genuinely uncertain, make your best conservative inference and
    note the uncertainty in the value itself. Never leave a field blank — a thoughtful
    inference is always more useful than an empty field.
  expected_output: >
    A single valid JSON object matching the exact schema above.
    No markdown. No code fences. No explanation before or after.
    Just the JSON object, starting with { and ending with }.
  agent: personality_agent