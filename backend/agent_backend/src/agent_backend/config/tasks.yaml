build_personality_profile:
  description: >
    Analyze the questionnaire responses below and build a deep one-person
    personality profile for SoulSync.

    Questionnaire responses:
    {questionnaire_json}

    You must return ONLY valid JSON (no markdown, no code block fences).

    JSON schema to follow exactly:
    {
      "summary": "short paragraph",
      "values": ["value1", "value2"],
      "communication_style": {
        "tone": "...",
        "directness": "...",
        "preferred_channel": "...",
        "notes": "..."
      },
      "behavior_patterns": {
        "decision_making": "...",
        "social_energy": "...",
        "stress_response": "...",
        "conflict_style": "..."
      },
      "relationship_preferences": {
        "short_term": "...",
        "long_term": "...",
        "boundaries": ["..."],
        "love_languages": ["..."]
      },
      "green_flags": ["..."],
      "red_flags": ["..."],
      "growth_edges": ["..."],
      "compatibility_hints": {
        "works_well_with": ["..."],
        "may_clash_with": ["..."]
      }
    }

    If any field is uncertain, infer conservatively from the responses.
  expected_output: >
    A single valid JSON object with the exact schema requested.
  agent: personality_agent
